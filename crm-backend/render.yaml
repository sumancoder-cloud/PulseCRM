services:
  - type: web
    name: pulsecrm-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx tsx seed.ts
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
